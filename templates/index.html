{% extends "base.html" %}

{% block title %}首頁 - 早療系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="text-center mb-5 mt-4">
            <h1 class="display-3 fw-bold mb-3" style="letter-spacing: -0.04em;">早療智慧管理系統</h1>
            <p class="fs-4 text-muted mx-auto" style="max-width: 700px;">專業、智慧、溫暖。為早療人員與照護者打造的共融協作平台。</p>
        </div>
        <!-- 功能卡片區域 -->
        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="card h-100 p-4">
                    <div class="card-body text-center">
                        <div class="icon-circle mb-4 bg-primary bg-opacity-10 text-primary mx-auto">
                            <i class="fas fa-user-md fa-3x"></i>
                        </div>
                        <h3 class="fw-bold mb-3">早療人員</h3>
                        <p class="text-muted mb-4">管理照護者帳號、兒童資料，協助上傳聯評報告，提供專業數據化管裡。</p>
                        <div class="text-start mb-4 bg-light p-3 rounded-3">
                            <div class="mb-2"><i class="fas fa-check text-primary me-2"></i>照護者帳號管理</div>
                            <div class="mb-2"><i class="fas fa-check text-primary me-2"></i>兒童資料維護</div>
                            <div><i class="fas fa-check text-primary me-2"></i>聯評報告自動化上傳</div>
                        </div>
                        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg w-100 py-3">
                            進入後台 <i class="fas fa-arrow-right ms-2"></i>
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card h-100 p-4">
                    <div class="card-body text-center">
                        <div class="icon-circle mb-4 bg-success bg-opacity-10 text-success mx-auto">
                            <i class="fas fa-user-heart fa-3x"></i>
                        </div>
                        <h3 class="fw-bold mb-3">照護者</h3>
                        <p class="text-muted mb-4">即時查看聯評報告，下載文件，並透過 AI 智慧諮詢獲得專業建議。</p>
                        <div class="text-start mb-4 bg-light p-3 rounded-3">
                            <div class="mb-2"><i class="fas fa-check text-success me-2"></i>視覺化報告查詢</div>
                            <div class="mb-2"><i class="fas fa-check text-success me-2"></i>AI 智慧對談與建議</div>
                            <div><i class="fas fa-check text-success me-2"></i>專業文件一鍵下載</div>
                        </div>
                        <a href="{{ url_for('login') }}" class="btn btn-success btn-lg w-100 py-3">
                            進入儀表板 <i class="fas fa-arrow-right ms-2"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 註冊提示 (已隱藏)
        <div class="text-center">
            <div class="card glass-effect fade-in-up" style="animation-delay: 0.8s;">
                <div class="card-body p-4">
                    <h5 class="mb-3">
                        <i class="fas fa-user-plus text-primary me-2"></i>還沒有帳號？
                    </h5>
                    <p class="mb-3">立即註冊開始使用早療系統</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-lg apple-glow">
                        <i class="fas fa-user-plus me-2"></i>立即註冊
                    </a>
                </div>
            </div>
        </div>
        -->
    </div>
</div>

<style>
.icon-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.card:hover .icon-circle {
    transform: scale(1.1) rotate(5deg);
}

.display-3 {
    background: linear-gradient(135deg, var(--apple-black), #4b5563);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}
</style>
{% endblock %}
