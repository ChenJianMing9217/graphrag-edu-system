{% extends "base.html" %}

{% block title %}登入 - 早療系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-lg border-0">
            <div class="card-header text-center py-5 bg-white border-0">
                <div class="login-icon mb-4 shadow-sm mx-auto">
                    <i class="fas fa-sign-in-alt fa-3x text-primary"></i>
                </div>
                <h2 class="fw-bold mb-1">歡迎回來</h2>
                <p class="text-muted">專業的早療數據協作平台</p>
            </div>
            <div class="card-body p-5">
                <form method="POST" class="needs-validation" novalidate>
                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-2"></i>用戶名
                        </label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" 
                               placeholder="請輸入您的用戶名" required>
                        <div class="invalid-feedback">
                            請輸入有效的用戶名
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>密碼
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control form-control-lg" id="password" name="password" 
                                   placeholder="請輸入您的密碼" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback">
                            請輸入您的密碼
                        </div>
                    </div>
                    
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>登入
                        </button>
                    </div>
                </form>
                
                <!-- 註冊連結 (已隱藏)
                <div class="text-center">
                    <div class="divider mb-4">
                        <span class="divider-text">或</span>
                    </div>
                    <p class="mb-0">
                        還沒有帳號？ 
                        <a href="{{ url_for('register') }}" class="text-primary fw-bold">
                            <i class="fas fa-user-plus me-1"></i>立即註冊
                        </a>
                    </p>
                </div>
                -->
            </div>
        </div>
        
    </div>
</div>

<style>
.login-icon {
    background: var(--apple-light-gray);
    border-radius: 1.25rem;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.divider {
    position: relative;
    text-align: center;
    margin: 2rem 0;
}

.divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(0, 0, 0, 0.05);
}

.divider-text {
    background: white;
    padding: 0 1rem;
    color: var(--apple-gray);
    font-size: 0.85rem;
    position: relative;
    z-index: 1;
}

.form-control-lg {
    border-radius: 1rem;
}
</style>

<script>
// 密碼顯示/隱藏切換
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordField = document.getElementById('password');
    const icon = this.querySelector('i');
    
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordField.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
});

// 表單驗證
(function() {
    'use strict';
    window.addEventListener('load', function() {
        var forms = document.getElementsByClassName('needs-validation');
        var validation = Array.prototype.filter.call(forms, function(form) {
            form.addEventListener('submit', function(event) {
                if (form.checkValidity() === false) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    }, false);
})();
</script>
{% endblock %}
