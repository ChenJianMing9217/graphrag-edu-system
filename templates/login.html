{% extends "base.html" %}

{% block title %}登入 - 早療系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card glass-effect">
            <div class="card-header text-center py-4">
                <div class="login-icon mb-3">
                    <i class="fas fa-sign-in-alt fa-3x text-primary"></i>
                </div>
                <h3 class="mb-0">歡迎回來</h3>
                <p class="text-muted mt-2">請登入您的帳號以繼續使用</p>
            </div>
            <div class="card-body p-5">
                <form method="POST" class="needs-validation" novalidate>
                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-2"></i>用戶名
                        </label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" 
                               placeholder="請輸入您的用戶名" required>
                        <div class="invalid-feedback">
                            請輸入有效的用戶名
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>密碼
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control form-control-lg" id="password" name="password" 
                                   placeholder="請輸入您的密碼" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback">
                            請輸入您的密碼
                        </div>
                    </div>
                    
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>登入
                        </button>
                    </div>
                </form>
                
                <div class="text-center">
                    <div class="divider mb-4">
                        <span class="divider-text">或</span>
                    </div>
                    <p class="mb-0">
                        還沒有帳號？ 
                        <a href="{{ url_for('register') }}" class="text-primary fw-bold">
                            <i class="fas fa-user-plus me-1"></i>立即註冊
                        </a>
                    </p>
                </div>
            </div>
        </div>
        
        <!-- 返回首頁 -->
        <div class="text-center mt-4">
            <a href="{{ url_for('index') }}" class="btn btn-outline-light">
                <i class="fas fa-arrow-left me-2"></i>返回首頁
            </a>
        </div>
    </div>
</div>

<style>
.login-icon {
    background: linear-gradient(135deg, rgba(0, 122, 255, 0.1), rgba(175, 82, 222, 0.1));
    border-radius: 50%;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    border: 2px solid rgba(0, 122, 255, 0.2);
}

.divider {
    position: relative;
    text-align: center;
}

.divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.2);
}

.divider-text {
    background: var(--apple-card-bg);
    padding: 0 1rem;
    color: var(--apple-gray);
    font-size: 0.9rem;
}

.form-control-lg {
    padding: 1rem 1.25rem;
    font-size: 1.1rem;
}

.btn-outline-light {
    border: 2px solid rgba(255, 255, 255, 0.3);
    color: white;
    transition: all 0.3s ease;
}

.btn-outline-light:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.5);
    color: white;
    transform: translateY(-2px);
}

/* 表單驗證樣式 */
.was-validated .form-control:invalid {
    border-color: var(--apple-red);
    box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.2);
}

.was-validated .form-control:valid {
    border-color: var(--apple-green);
    box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.2);
}
</style>

<script>
// 密碼顯示/隱藏切換
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordField = document.getElementById('password');
    const icon = this.querySelector('i');
    
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordField.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
});

// 表單驗證
(function() {
    'use strict';
    window.addEventListener('load', function() {
        var forms = document.getElementsByClassName('needs-validation');
        var validation = Array.prototype.filter.call(forms, function(form) {
            form.addEventListener('submit', function(event) {
                if (form.checkValidity() === false) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    }, false);
})();
</script>
{% endblock %}
