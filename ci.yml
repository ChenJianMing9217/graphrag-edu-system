name: CI #名字
on: #觸發條件
  push:
    branches: ["main"]
  pull_request: #當有 pull request 時觸發

jobs: #工作
  basic:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4 #檢查代碼
      - uses: actions/setup-python@v5 #設定 Python 版本
        with:
          python-version: "3.11" # Python 版本
      - run: |
          python -m pip install --upgrade pip #升級 pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi #安裝 requirements.txt
      - run: python -m py_compile app.py #編譯 app.py