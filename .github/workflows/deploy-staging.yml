name: Deploy Staging

on:
  workflow_run:
    workflows: ["Build and Push Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and up (staging)
        shell: pwsh
        run: |
          docker compose -p graphrag_staging -f docker-compose.yml -f docker-compose.staging.yml pull
          docker compose -p graphrag_staging -f docker-compose.yml -f docker-compose.staging.yml up -d